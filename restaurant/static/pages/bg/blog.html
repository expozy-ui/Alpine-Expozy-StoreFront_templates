<!-- Restaurant Blog Page - Bulgarian -->
<div class="min-h-screen bg-stone-50 dark:bg-stone-900">
    <!-- Hero Section -->
    <section class="relative h-[40vh] bg-cover bg-center bg-fixed" style="background-image: url('https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=1920');">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="relative h-full flex items-center justify-center text-center">
            <div>
                <h1 class="text-5xl md:text-6xl font-bold text-white mb-4">Нашият блог</h1>
                <p class="text-xl text-stone-300">Истории, рецепти и кулинарни съвети</p>
            </div>
        </div>
    </section>

    <!-- Blog Posts Grid -->
    <section class="py-16" apidata="get.posts" keyname="posts">
        <div class="container mx-auto px-4">
            <!-- Category Filter -->
            <div class="flex flex-wrap justify-center gap-4 mb-12" x-data="{activeCategory: 'all'}">
                <button @click="activeCategory = 'all'"
                    :class="activeCategory === 'all' ? 'bg-amber-600 text-white' : 'bg-stone-100 dark:bg-stone-800 text-stone-700 dark:text-stone-300'"
                    class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-amber-600 hover:text-white">
                    Всички публикации
                </button>
                <button @click="activeCategory = 'recipes'"
                    :class="activeCategory === 'recipes' ? 'bg-amber-600 text-white' : 'bg-stone-100 dark:bg-stone-800 text-stone-700 dark:text-stone-300'"
                    class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-amber-600 hover:text-white">
                    Рецепти
                </button>
                <button @click="activeCategory = 'tips'"
                    :class="activeCategory === 'tips' ? 'bg-amber-600 text-white' : 'bg-stone-100 dark:bg-stone-800 text-stone-700 dark:text-stone-300'"
                    class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-amber-600 hover:text-white">
                    Съвети за готвене
                </button>
                <button @click="activeCategory = 'stories'"
                    :class="activeCategory === 'stories' ? 'bg-amber-600 text-white' : 'bg-stone-100 dark:bg-stone-800 text-stone-700 dark:text-stone-300'"
                    class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-amber-600 hover:text-white">
                    Истории
                </button>
                <button @click="activeCategory = 'news'"
                    :class="activeCategory === 'news' ? 'bg-amber-600 text-white' : 'bg-stone-100 dark:bg-stone-800 text-stone-700 dark:text-stone-300'"
                    class="px-6 py-2 rounded-full font-semibold transition-all hover:bg-amber-600 hover:text-white">
                    Новини
                </button>
            </div>

            <!-- Posts Grid -->
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
                <template x-for="post in data.posts || []" :key="post.id">
                    <article class="bg-white dark:bg-stone-800 rounded-2xl shadow-lg overflow-hidden group">
                        <a :href="'/bg/post/' + post.slug" class="block">
                            <div class="relative h-56 overflow-hidden">
                                <img :src="post.image" :alt="post.title" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                <div class="absolute top-4 left-4">
                                    <span class="px-3 py-1 bg-stone-900/70 backdrop-blur text-white text-sm rounded-full" x-text="post.category"></span>
                                </div>
                            </div>
                            <div class="p-6">
                                <div class="flex items-center gap-4 text-sm text-stone-500 dark:text-stone-400 mb-3">
                                    <span x-text="post.date"></span>
                                    <span>•</span>
                                    <span x-text="post.readTime + ' мин четене'"></span>
                                </div>
                                <h3 class="text-xl font-bold text-stone-800 dark:text-white mb-3 group-hover:text-amber-600 transition-colors line-clamp-2" x-text="post.title"></h3>
                                <p class="text-stone-600 dark:text-stone-400 text-sm line-clamp-3" x-text="post.excerpt"></p>
                            </div>
                        </a>
                        <div class="px-6 pb-6 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <img :src="post.author.avatar" :alt="post.author.name" class="w-8 h-8 rounded-full object-cover">
                                <span class="text-sm text-stone-600 dark:text-stone-400" x-text="post.author.name"></span>
                            </div>
                            <a :href="'/bg/post/' + post.slug" class="text-amber-600 font-semibold text-sm hover:text-amber-700 flex items-center gap-1">
                                Прочети <i class="fa-solid fa-arrow-right text-xs"></i>
                            </a>
                        </div>
                    </article>
                </template>
            </div>

            <!-- Pagination -->
            <div class="flex justify-center gap-2 mt-12">
                <button class="w-10 h-10 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-400 hover:bg-amber-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button class="w-10 h-10 rounded-full bg-amber-600 text-white">1</button>
                <button class="w-10 h-10 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-400 hover:bg-amber-600 hover:text-white transition-colors">2</button>
                <button class="w-10 h-10 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-400 hover:bg-amber-600 hover:text-white transition-colors">3</button>
                <button class="w-10 h-10 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-400 hover:bg-amber-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Newsletter Section -->
    <section class="py-16 bg-stone-100 dark:bg-stone-800">
        <div class="container mx-auto px-4">
            <div class="max-w-2xl mx-auto text-center">
                <i class="fa-solid fa-envelope text-5xl text-amber-600 mb-6"></i>
                <h2 class="text-3xl font-bold text-stone-800 dark:text-white mb-4">Абонирайте се за нашия бюлетин</h2>
                <p class="text-stone-600 dark:text-stone-400 mb-8">
                    Получавайте най-новите рецепти, съвети за готвене и новини от ресторанта.
                </p>
                <form class="flex flex-col sm:flex-row gap-4">
                    <input type="email" name="email" placeholder="Въведете вашия имейл" required
                        class="flex-1 px-6 py-4 border border-stone-300 dark:border-stone-600 rounded-lg bg-white dark:bg-stone-700 text-stone-800 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
                    <button @click="alpineListeners('Newsletter.post_newsletter', $event)" type="button"
                        class="px-8 py-4 bg-gradient-to-r from-amber-600 to-amber-700 text-white font-semibold rounded-lg hover:from-amber-700 hover:to-amber-800 transition-all">
                        Абонирай се
                    </button>
                </form>
            </div>
        </div>
    </section>
</div>
