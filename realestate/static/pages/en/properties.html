<!-- Real Estate Properties Listing Page -->
<div class="min-h-screen bg-slate-50 dark:bg-slate-900" x-data="{
    viewMode: 'grid',
    showFilters: false,
    sortBy: 'newest'
}">
    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-emerald-600 to-emerald-700 py-16">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Find Your Perfect Property</h1>
            <p class="text-emerald-100 text-xl">Browse through our extensive collection of premium properties</p>
        </div>
    </section>

    <!-- Search & Filters -->
    <section class="py-8 bg-white dark:bg-slate-800 shadow-lg sticky top-20 z-30">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <!-- Quick Filters -->
                <div class="flex flex-wrap gap-3">
                    <select name="status" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                        <option value="">Buy or Rent</option>
                        <option value="sale">For Sale</option>
                        <option value="rent">For Rent</option>
                    </select>
                    <select name="type" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                        <option value="">Property Type</option>
                        <option value="house">House</option>
                        <option value="apartment">Apartment</option>
                        <option value="condo">Condo</option>
                        <option value="villa">Villa</option>
                        <option value="land">Land</option>
                    </select>
                    <select name="beds" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                        <option value="">Bedrooms</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                        <option value="5">5+</option>
                    </select>
                    <button @click="showFilters = !showFilters" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2">
                        <i class="fa-solid fa-sliders"></i>
                        More Filters
                    </button>
                </div>

                <!-- Sort & View -->
                <div class="flex items-center gap-4">
                    <select x-model="sortBy" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                        <option value="newest">Newest First</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="sqft">Square Feet</option>
                    </select>
                    <div class="flex border border-slate-300 dark:border-slate-600 rounded-lg overflow-hidden">
                        <button @click="viewMode = 'grid'" :class="viewMode === 'grid' ? 'bg-emerald-600 text-white' : 'text-slate-600 dark:text-slate-400'" class="px-3 py-2 hover:bg-emerald-100 dark:hover:bg-slate-700">
                            <i class="fa-solid fa-grip"></i>
                        </button>
                        <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-emerald-600 text-white' : 'text-slate-600 dark:text-slate-400'" class="px-3 py-2 hover:bg-emerald-100 dark:hover:bg-slate-700">
                            <i class="fa-solid fa-list"></i>
                        </button>
                        <button @click="viewMode = 'map'" :class="viewMode === 'map' ? 'bg-emerald-600 text-white' : 'text-slate-600 dark:text-slate-400'" class="px-3 py-2 hover:bg-emerald-100 dark:hover:bg-slate-700">
                            <i class="fa-solid fa-map"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Extended Filters -->
            <div x-show="showFilters" x-collapse class="mt-6 pt-6 border-t border-slate-200 dark:border-slate-700">
                <div class="grid md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-slate-600 dark:text-slate-300 text-sm mb-2">Min Price</label>
                        <input type="number" name="minPrice" placeholder="$0"
                            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-slate-600 dark:text-slate-300 text-sm mb-2">Max Price</label>
                        <input type="number" name="maxPrice" placeholder="Any"
                            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-slate-600 dark:text-slate-300 text-sm mb-2">Min Sqft</label>
                        <input type="number" name="minSqft" placeholder="0"
                            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-slate-600 dark:text-slate-300 text-sm mb-2">Max Sqft</label>
                        <input type="number" name="maxSqft" placeholder="Any"
                            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div class="flex flex-wrap gap-4 mt-4">
                    <h4 class="w-full text-sm font-semibold text-slate-700 dark:text-slate-300">Amenities</h4>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="pool" class="w-4 h-4 text-emerald-600 rounded">
                        <span class="text-slate-600 dark:text-slate-400">Pool</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="garage" class="w-4 h-4 text-emerald-600 rounded">
                        <span class="text-slate-600 dark:text-slate-400">Garage</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="garden" class="w-4 h-4 text-emerald-600 rounded">
                        <span class="text-slate-600 dark:text-slate-400">Garden</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="gym" class="w-4 h-4 text-emerald-600 rounded">
                        <span class="text-slate-600 dark:text-slate-400">Gym</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="security" class="w-4 h-4 text-emerald-600 rounded">
                        <span class="text-slate-600 dark:text-slate-400">24/7 Security</span>
                    </label>
                </div>
            </div>
        </div>
    </section>

    <!-- Properties Grid -->
    <section class="py-12" apidata="get.properties" keyname="properties">
        <div class="container mx-auto px-4">
            <!-- Results Count -->
            <div class="flex justify-between items-center mb-8">
                <p class="text-slate-600 dark:text-slate-400">
                    Showing <span class="font-semibold text-slate-800 dark:text-white" x-text="(data.properties || []).length"></span> properties
                </p>
            </div>

            <!-- Grid View -->
            <div x-show="viewMode === 'grid'" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="property in data.properties || []" :key="property.id">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-lg group hover:shadow-xl transition-shadow">
                        <div class="relative h-64 overflow-hidden">
                            <img :src="property.image" :alt="property.title" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-4 left-4 flex gap-2">
                                <span class="px-3 py-1 bg-emerald-600 text-white text-sm font-semibold rounded-full" x-text="property.status"></span>
                            </div>
                            <button class="absolute top-4 right-4 w-10 h-10 bg-white/90 rounded-full flex items-center justify-center text-slate-600 hover:text-red-500 hover:bg-white transition-colors">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                            <div class="absolute bottom-4 left-4 right-4">
                                <div class="text-2xl font-bold text-white drop-shadow-lg" x-text="'$' + property.price.toLocaleString()"></div>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 group-hover:text-emerald-600 transition-colors" x-text="property.title"></h3>
                            <p class="text-slate-500 flex items-center gap-2 mb-4">
                                <i class="fa-solid fa-location-dot text-emerald-600"></i>
                                <span x-text="property.location"></span>
                            </p>
                            <div class="flex items-center gap-4 text-slate-600 dark:text-slate-400 text-sm border-t border-slate-200 dark:border-slate-600 pt-4">
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-bed text-emerald-600"></i>
                                    <span x-text="property.bedrooms"></span>
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-bath text-emerald-600"></i>
                                    <span x-text="property.bathrooms"></span>
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-ruler-combined text-emerald-600"></i>
                                    <span x-text="property.sqft + ' sqft'"></span>
                                </span>
                            </div>
                        </div>
                        <div class="px-6 pb-6">
                            <a :href="'/en/property/' + property.slug" class="block w-full py-3 text-center bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
                                View Details
                            </a>
                        </div>
                    </div>
                </template>
            </div>

            <!-- List View -->
            <div x-show="viewMode === 'list'" class="space-y-6">
                <template x-for="property in data.properties || []" :key="property.id">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-lg flex flex-col md:flex-row">
                        <div class="md:w-80 h-64 md:h-auto relative">
                            <img :src="property.image" :alt="property.title" class="w-full h-full object-cover">
                            <div class="absolute top-4 left-4">
                                <span class="px-3 py-1 bg-emerald-600 text-white text-sm font-semibold rounded-full" x-text="property.status"></span>
                            </div>
                        </div>
                        <div class="flex-1 p-6 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-2" x-text="property.title"></h3>
                                        <p class="text-slate-500 flex items-center gap-2">
                                            <i class="fa-solid fa-location-dot text-emerald-600"></i>
                                            <span x-text="property.location"></span>
                                        </p>
                                    </div>
                                    <div class="text-2xl font-bold text-emerald-600" x-text="'$' + property.price.toLocaleString()"></div>
                                </div>
                                <p class="text-slate-600 dark:text-slate-400 mt-4" x-text="property.description"></p>
                            </div>
                            <div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-200 dark:border-slate-700">
                                <div class="flex items-center gap-6 text-slate-600 dark:text-slate-400">
                                    <span class="flex items-center gap-2">
                                        <i class="fa-solid fa-bed text-emerald-600"></i>
                                        <span x-text="property.bedrooms + ' Beds'"></span>
                                    </span>
                                    <span class="flex items-center gap-2">
                                        <i class="fa-solid fa-bath text-emerald-600"></i>
                                        <span x-text="property.bathrooms + ' Baths'"></span>
                                    </span>
                                    <span class="flex items-center gap-2">
                                        <i class="fa-solid fa-ruler-combined text-emerald-600"></i>
                                        <span x-text="property.sqft + ' sqft'"></span>
                                    </span>
                                </div>
                                <a :href="'/en/property/' + property.slug" class="px-6 py-3 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
                                    View Details
                                </a>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Map View Placeholder -->
            <div x-show="viewMode === 'map'" class="h-[600px] bg-slate-200 dark:bg-slate-700 rounded-2xl flex items-center justify-center">
                <div class="text-center text-slate-500 dark:text-slate-400">
                    <i class="fa-solid fa-map text-6xl mb-4"></i>
                    <p>Interactive Map View</p>
                    <p class="text-sm">Map integration would be displayed here</p>
                </div>
            </div>

            <!-- Pagination -->
            <div class="flex justify-center gap-2 mt-12">
                <button class="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 shadow hover:bg-emerald-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button class="w-10 h-10 rounded-lg bg-emerald-600 text-white shadow">1</button>
                <button class="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 shadow hover:bg-emerald-600 hover:text-white transition-colors">2</button>
                <button class="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 shadow hover:bg-emerald-600 hover:text-white transition-colors">3</button>
                <button class="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 shadow hover:bg-emerald-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>
</div>
