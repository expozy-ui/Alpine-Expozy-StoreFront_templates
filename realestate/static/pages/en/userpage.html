<!-- Real Estate User Dashboard Page -->
<div class="min-h-screen bg-slate-50 dark:bg-slate-900" x-data="{ activeTab: 'dashboard' }" apidata="get.user" keyname="user">
    <div class="container mx-auto px-4 py-8">
        <div class="grid lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-6 sticky top-24">
                    <!-- User Profile -->
                    <div class="text-center pb-6 border-b border-slate-200 dark:border-slate-700">
                        <img :src="data.user?.avatar" :alt="data.user?.name" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
                        <h2 class="text-xl font-bold text-slate-800 dark:text-white" x-text="data.user?.name"></h2>
                        <p class="text-slate-500" x-text="data.user?.email"></p>
                        <span class="inline-block mt-2 px-3 py-1 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-sm rounded-full" x-text="data.user?.memberSince"></span>
                    </div>

                    <!-- Navigation -->
                    <nav class="mt-6 space-y-2">
                        <button @click="activeTab = 'dashboard'"
                            :class="activeTab === 'dashboard' ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-chart-line w-5"></i>
                            Dashboard
                        </button>
                        <button @click="activeTab = 'saved'"
                            :class="activeTab === 'saved' ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-heart w-5"></i>
                            Saved Properties
                            <span class="ml-auto bg-emerald-600 text-white text-xs px-2 py-1 rounded-full" x-text="(data.user?.savedProperties || []).length"></span>
                        </button>
                        <button @click="activeTab = 'listings'"
                            :class="activeTab === 'listings' ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-building w-5"></i>
                            My Listings
                        </button>
                        <button @click="activeTab = 'searches'"
                            :class="activeTab === 'searches' ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-search w-5"></i>
                            Saved Searches
                        </button>
                        <button @click="activeTab = 'messages'"
                            :class="activeTab === 'messages' ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-envelope w-5"></i>
                            Messages
                            <span class="ml-auto bg-red-500 text-white text-xs px-2 py-1 rounded-full" x-text="data.user?.unreadMessages || 0"></span>
                        </button>
                        <button @click="activeTab = 'settings'"
                            :class="activeTab === 'settings' ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' : 'text-slate-600 dark:text-slate-400'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-gear w-5"></i>
                            Settings
                        </button>
                    </nav>

                    <button @click="alpineListeners('Auth.logout', $event)"
                        class="w-full mt-6 flex items-center justify-center gap-2 px-4 py-3 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Logout
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Dashboard Tab -->
                <div x-show="activeTab === 'dashboard'" class="space-y-6">
                    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Dashboard</h1>

                    <!-- Stats Cards -->
                    <div class="grid md:grid-cols-4 gap-6">
                        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-slate-500 text-sm">Saved Properties</p>
                                    <p class="text-2xl font-bold text-slate-800 dark:text-white" x-text="(data.user?.savedProperties || []).length"></p>
                                </div>
                                <div class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-heart text-emerald-600"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-slate-500 text-sm">Active Listings</p>
                                    <p class="text-2xl font-bold text-slate-800 dark:text-white" x-text="data.user?.activeListings || 0"></p>
                                </div>
                                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-building text-blue-600"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-slate-500 text-sm">Views This Month</p>
                                    <p class="text-2xl font-bold text-slate-800 dark:text-white" x-text="data.user?.monthlyViews || 0"></p>
                                </div>
                                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-eye text-purple-600"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-slate-500 text-sm">Inquiries</p>
                                    <p class="text-2xl font-bold text-slate-800 dark:text-white" x-text="data.user?.inquiries || 0"></p>
                                </div>
                                <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-envelope text-amber-600"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Activity -->
                    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-4">Recent Activity</h3>
                        <div class="space-y-4">
                            <template x-for="activity in data.user?.recentActivity || []" :key="activity.id">
                                <div class="flex items-center gap-4 p-4 bg-slate-50 dark:bg-slate-700/50 rounded-lg">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center"
                                        :class="activity.type === 'view' ? 'bg-blue-100 text-blue-600' : activity.type === 'save' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'">
                                        <i :class="activity.type === 'view' ? 'fa-solid fa-eye' : activity.type === 'save' ? 'fa-solid fa-heart' : 'fa-solid fa-envelope'"></i>
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-slate-800 dark:text-white font-medium" x-text="activity.message"></p>
                                        <p class="text-slate-500 text-sm" x-text="activity.date"></p>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Saved Properties Tab -->
                <div x-show="activeTab === 'saved'" x-cloak class="space-y-6">
                    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Saved Properties</h1>
                    <div class="grid md:grid-cols-2 gap-6">
                        <template x-for="property in data.user?.savedProperties || []" :key="property.id">
                            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg overflow-hidden group">
                                <div class="relative h-48">
                                    <img :src="property.image" :alt="property.title" class="w-full h-full object-cover">
                                    <button class="absolute top-4 right-4 w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition-colors">
                                        <i class="fa-solid fa-heart"></i>
                                    </button>
                                </div>
                                <div class="p-4">
                                    <div class="text-lg font-bold text-emerald-600" x-text="'$' + property.price.toLocaleString()"></div>
                                    <h3 class="font-bold text-slate-800 dark:text-white" x-text="property.title"></h3>
                                    <p class="text-slate-500 text-sm" x-text="property.location"></p>
                                    <a :href="'/en/property/' + property.slug" class="block mt-4 py-2 text-center bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-colors">
                                        View Details
                                    </a>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Settings Tab -->
                <div x-show="activeTab === 'settings'" x-cloak class="space-y-6">
                    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Account Settings</h1>

                    <!-- Profile Settings -->
                    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-6">Profile Information</h3>
                        <form class="space-y-6">
                            <div class="grid md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">First Name</label>
                                    <input type="text" name="firstName" :value="data.user?.firstName"
                                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                                </div>
                                <div>
                                    <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">Last Name</label>
                                    <input type="text" name="lastName" :value="data.user?.lastName"
                                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">Email</label>
                                <input type="email" name="email" :value="data.user?.email"
                                    class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">Phone</label>
                                <input type="tel" name="phone" :value="data.user?.phone"
                                    class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <button @click="alpineListeners('User.update_profile', $event)" type="button"
                                class="px-6 py-3 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
                                Save Changes
                            </button>
                        </form>
                    </div>

                    <!-- Password Settings -->
                    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-6">Change Password</h3>
                        <form class="space-y-6">
                            <div>
                                <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">Current Password</label>
                                <input type="password" name="currentPassword"
                                    class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">New Password</label>
                                <input type="password" name="newPassword"
                                    class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2">Confirm New Password</label>
                                <input type="password" name="confirmPassword"
                                    class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <button @click="alpineListeners('User.change_password', $event)" type="button"
                                class="px-6 py-3 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
                                Update Password
                            </button>
                        </form>
                    </div>

                    <!-- Notification Preferences -->
                    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-6">Notification Preferences</h3>
                        <div class="space-y-4">
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-slate-700 dark:text-slate-300">Email notifications for new listings</span>
                                <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded" checked>
                            </label>
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-slate-700 dark:text-slate-300">Price drop alerts</span>
                                <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded" checked>
                            </label>
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-slate-700 dark:text-slate-300">Weekly market reports</span>
                                <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded">
                            </label>
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-slate-700 dark:text-slate-300">SMS notifications</span>
                                <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded">
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
