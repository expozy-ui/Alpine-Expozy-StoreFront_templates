<!-- Medical/Healthcare Header -->
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
    x-data="{ mobileMenu: false, scrolled: false }"
    @scroll.window="scrolled = window.pageYOffset > 50"
    :class="scrolled ? 'bg-white shadow-lg' : 'bg-white/95 backdrop-blur-md'">

    <!-- Top Bar -->
    <div class="bg-teal-600 text-white text-sm py-2">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <span class="flex items-center gap-2">
                        <i class="fa-solid fa-clock"></i>
                        <span>Mon-Fri: 8:00am - 6:00pm | Sat: 9:00am - 2:00pm</span>
                    </span>
                    <span class="hidden md:flex items-center gap-2">
                        <i class="fa-solid fa-phone"></i>
                        <span>Emergency: +1 (555) 911-1234</span>
                    </span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="#" class="hover:text-teal-200"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="hover:text-teal-200"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#" class="hover:text-teal-200"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="container mx-auto px-4">
        <div class="flex items-center justify-between h-20">
            <!-- Logo -->
            <a href="/en/homepage" class="flex items-center">
                <img :src="data.settings?.logo" alt="Medical Logo" class="h-12">
            </a>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center gap-8">
                <a href="/en/homepage" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Home</a>
                <a href="/en/about" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">About Us</a>
                <a href="/en/services" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Services</a>
                <a href="/en/doctors" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Our Doctors</a>
                <a href="/en/departments" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Departments</a>
                <a href="/en/blog" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Health Blog</a>
                <a href="/en/contacts" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Contact</a>
            </div>

            <!-- CTA Buttons -->
            <div class="hidden lg:flex items-center gap-4">
                <a href="/en/login" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">
                    <i class="fa-solid fa-user mr-2"></i>Patient Portal
                </a>
                <a href="/en/appointments" class="px-6 py-3 bg-teal-600 text-white font-semibold rounded-full hover:bg-teal-700 transition-colors">
                    Book Appointment
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-slate-700 text-2xl">
                <i :class="mobileMenu ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div x-show="mobileMenu" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-4"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-4"
            class="lg:hidden bg-white border-t rounded-b-xl shadow-lg p-4">
            <div class="flex flex-col gap-4">
                <a href="/en/homepage" class="text-slate-700 font-semibold hover:text-teal-600">Home</a>
                <a href="/en/about" class="text-slate-700 font-semibold hover:text-teal-600">About Us</a>
                <a href="/en/services" class="text-slate-700 font-semibold hover:text-teal-600">Services</a>
                <a href="/en/doctors" class="text-slate-700 font-semibold hover:text-teal-600">Our Doctors</a>
                <a href="/en/departments" class="text-slate-700 font-semibold hover:text-teal-600">Departments</a>
                <a href="/en/blog" class="text-slate-700 font-semibold hover:text-teal-600">Health Blog</a>
                <a href="/en/contacts" class="text-slate-700 font-semibold hover:text-teal-600">Contact</a>
                <hr class="border-slate-200">
                <a href="/en/login" class="text-slate-700 font-semibold hover:text-teal-600">
                    <i class="fa-solid fa-user mr-2"></i>Patient Portal
                </a>
                <a href="/en/appointments" class="px-6 py-3 bg-teal-600 text-white font-semibold rounded-full text-center">
                    Book Appointment
                </a>
            </div>
        </div>
    </nav>
</header>
<div class="h-32"></div>
