<!-- Медицински център Вход страница -->
<div class="min-h-screen bg-gradient-to-br from-teal-50 via-white to-blue-50 flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md" x-data="{ activeTab: 'login', showPassword: false }">
        <!-- Лого -->
        <div class="text-center mb-8">
            <a href="/bg/homepage">
                <img :src="data.settings?.logo" alt="Медицински център лого" class="h-16 mx-auto mb-4">
            </a>
            <h1 class="text-2xl font-bold text-slate-800">Портал за пациенти</h1>
            <p class="text-slate-600">Достъп до здравните ви записи</p>
        </div>

        <!-- Карта за автентикация -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Табове -->
            <div class="flex border-b border-slate-200">
                <button @click="activeTab = 'login'"
                    :class="activeTab === 'login' ? 'bg-teal-50 text-teal-600 border-b-2 border-teal-600' : 'text-slate-500'"
                    class="flex-1 py-4 font-semibold transition-colors">
                    Вход
                </button>
                <button @click="activeTab = 'register'"
                    :class="activeTab === 'register' ? 'bg-teal-50 text-teal-600 border-b-2 border-teal-600' : 'text-slate-500'"
                    class="flex-1 py-4 font-semibold transition-colors">
                    Нов пациент
                </button>
            </div>

            <div class="p-8">
                <!-- Форма за вход -->
                <form x-show="activeTab === 'login'" class="space-y-6">
                    <div>
                        <label class="block text-slate-700 font-semibold mb-2">Имейл адрес</label>
                        <div class="relative">
                            <input type="email" name="email" required placeholder="вашият@имейл.com"
                                class="w-full px-4 py-3 pl-11 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                            <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        </div>
                    </div>

                    <div>
                        <label class="block text-slate-700 font-semibold mb-2">Парола</label>
                        <div class="relative">
                            <input :type="showPassword ? 'text' : 'password'" name="password" required placeholder="••••••••"
                                class="w-full px-4 py-3 pl-11 pr-11 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <button type="button" @click="showPassword = !showPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <i :class="showPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="remember" class="w-4 h-4 text-teal-600 rounded border-slate-300">
                            <span class="text-slate-600 text-sm">Запомни ме</span>
                        </label>
                        <a href="/bg/forgot-password" class="text-teal-600 text-sm font-semibold hover:text-teal-700">Забравена парола?</a>
                    </div>

                    <button @click="alpineListeners('Auth.login', $event)" type="button"
                        class="w-full py-4 bg-teal-600 text-white font-semibold rounded-full hover:bg-teal-700 transition-colors">
                        Вход
                    </button>
                </form>

                <!-- Форма за регистрация -->
                <form x-show="activeTab === 'register'" x-cloak class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-700 font-semibold mb-2">Име</label>
                            <input type="text" name="firstName" required
                                class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                        </div>
                        <div>
                            <label class="block text-slate-700 font-semibold mb-2">Фамилия</label>
                            <input type="text" name="lastName" required
                                class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-slate-700 font-semibold mb-2">Имейл адрес</label>
                        <input type="email" name="email" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                    </div>

                    <div>
                        <label class="block text-slate-700 font-semibold mb-2">Телефон</label>
                        <input type="tel" name="phone" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                    </div>

                    <div>
                        <label class="block text-slate-700 font-semibold mb-2">Дата на раждане</label>
                        <input type="date" name="dob" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                    </div>

                    <div>
                        <label class="block text-slate-700 font-semibold mb-2">Парола</label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                    </div>

                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" name="terms" required class="w-4 h-4 text-teal-600 rounded border-slate-300 mt-1">
                        <span class="text-slate-600 text-sm">
                            Съгласявам се с <a href="/bg/terms-conditions" class="text-teal-600 hover:underline">Общите условия</a>
                            и <a href="/bg/gdpr" class="text-teal-600 hover:underline">Политиката за поверителност</a>
                        </span>
                    </label>

                    <button @click="alpineListeners('Auth.register', $event)" type="button"
                        class="w-full py-4 bg-teal-600 text-white font-semibold rounded-full hover:bg-teal-700 transition-colors">
                        Създай акаунт
                    </button>
                </form>
            </div>
        </div>

        <!-- Помощ -->
        <p class="text-center text-slate-600 mt-6">
            Нуждаете се от помощ? <a href="/bg/contacts" class="text-teal-600 font-semibold hover:text-teal-700">Свържете се с нас</a>
        </p>

        <!-- Съобщение за сигурност -->
        <div class="mt-6 bg-teal-50 rounded-xl p-4 text-center">
            <i class="fa-solid fa-shield-halved text-teal-600 mr-2"></i>
            <span class="text-teal-700 text-sm">Вашата информация е защитена с 256-битово криптиране</span>
        </div>
    </div>
</div>
