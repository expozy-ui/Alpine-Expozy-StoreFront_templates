<!-- Медицински център Хедър -->
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
    x-data="{ mobileMenu: false, scrolled: false }"
    @scroll.window="scrolled = window.pageYOffset > 50"
    :class="scrolled ? 'bg-white shadow-lg' : 'bg-white/95 backdrop-blur-md'">

    <!-- Горна лента -->
    <div class="bg-teal-600 text-white text-sm py-2">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <span class="flex items-center gap-2">
                        <i class="fa-solid fa-clock"></i>
                        <span>Пон-Пет: 8:00 - 18:00 | Съб: 9:00 - 14:00</span>
                    </span>
                    <span class="hidden md:flex items-center gap-2">
                        <i class="fa-solid fa-phone"></i>
                        <span>Спешен: +359 2 911 1234</span>
                    </span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="#" class="hover:text-teal-200"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="hover:text-teal-200"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#" class="hover:text-teal-200"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Основна навигация -->
    <nav class="container mx-auto px-4">
        <div class="flex items-center justify-between h-20">
            <a href="/bg/homepage" class="flex items-center">
                <img :src="data.settings?.logo" alt="Медицински център" class="h-12">
            </a>

            <div class="hidden lg:flex items-center gap-8">
                <a href="/bg/homepage" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Начало</a>
                <a href="/bg/about" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">За нас</a>
                <a href="/bg/services" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Услуги</a>
                <a href="/bg/doctors" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Лекари</a>
                <a href="/bg/blog" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Здравен блог</a>
                <a href="/bg/contacts" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">Контакти</a>
            </div>

            <div class="hidden lg:flex items-center gap-4">
                <a href="/bg/login" class="text-slate-700 font-semibold hover:text-teal-600 transition-colors">
                    <i class="fa-solid fa-user mr-2"></i>Пациентски портал
                </a>
                <a href="/bg/appointments" class="px-6 py-3 bg-teal-600 text-white font-semibold rounded-full hover:bg-teal-700 transition-colors">
                    Запазете час
                </a>
            </div>

            <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-slate-700 text-2xl">
                <i :class="mobileMenu ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
            </button>
        </div>

        <!-- Мобилно меню -->
        <div x-show="mobileMenu" x-transition class="lg:hidden bg-white border-t rounded-b-xl shadow-lg p-4">
            <div class="flex flex-col gap-4">
                <a href="/bg/homepage" class="text-slate-700 font-semibold hover:text-teal-600">Начало</a>
                <a href="/bg/about" class="text-slate-700 font-semibold hover:text-teal-600">За нас</a>
                <a href="/bg/services" class="text-slate-700 font-semibold hover:text-teal-600">Услуги</a>
                <a href="/bg/doctors" class="text-slate-700 font-semibold hover:text-teal-600">Лекари</a>
                <a href="/bg/blog" class="text-slate-700 font-semibold hover:text-teal-600">Здравен блог</a>
                <a href="/bg/contacts" class="text-slate-700 font-semibold hover:text-teal-600">Контакти</a>
                <hr class="border-slate-200">
                <a href="/bg/login" class="text-slate-700 font-semibold hover:text-teal-600">
                    <i class="fa-solid fa-user mr-2"></i>Пациентски портал
                </a>
                <a href="/bg/appointments" class="px-6 py-3 bg-teal-600 text-white font-semibold rounded-full text-center">
                    Запазете час
                </a>
            </div>
        </div>
    </nav>
</header>
<div class="h-32"></div>
