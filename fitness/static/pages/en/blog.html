<!-- Fitness/Gym Blog Page -->
<div class="min-h-screen bg-slate-900" apidata="get.blog_posts" keyname="posts">
    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-slate-900 via-slate-800 to-orange-900 py-16">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 uppercase">Fitness Blog</h1>
            <p class="text-slate-300 text-xl">Tips, workouts, and inspiration for your fitness journey</p>
        </div>
    </section>

    <!-- Categories -->
    <section class="py-8 bg-slate-800">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap justify-center gap-3" x-data="{ activeCategory: 'all' }">
                <button @click="activeCategory = 'all'"
                    :class="activeCategory === 'all' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    All Posts
                </button>
                <button @click="activeCategory = 'workouts'"
                    :class="activeCategory === 'workouts' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Workouts
                </button>
                <button @click="activeCategory = 'nutrition'"
                    :class="activeCategory === 'nutrition' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Nutrition
                </button>
                <button @click="activeCategory = 'wellness'"
                    :class="activeCategory === 'wellness' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Wellness
                </button>
                <button @click="activeCategory = 'success-stories'"
                    :class="activeCategory === 'success-stories' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Success Stories
                </button>
            </div>
        </div>
    </section>

    <!-- Featured Post -->
    <section class="py-12">
        <div class="container mx-auto px-4">
            <template x-if="data.posts?.featured">
                <a :href="'/en/blog/' + data.posts.featured.slug" class="block bg-slate-800 rounded-2xl overflow-hidden group">
                    <div class="grid lg:grid-cols-2">
                        <div class="h-64 lg:h-auto overflow-hidden">
                            <img :src="data.posts.featured.image" :alt="data.posts.featured.title"
                                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-8 lg:p-12 flex flex-col justify-center">
                            <span class="inline-block px-3 py-1 bg-orange-500/20 text-orange-500 text-xs font-bold uppercase rounded mb-4 w-fit" x-text="data.posts.featured.category"></span>
                            <h2 class="text-2xl lg:text-3xl font-black text-white mb-4 group-hover:text-orange-500 transition-colors" x-text="data.posts.featured.title"></h2>
                            <p class="text-slate-400 mb-6 line-clamp-3" x-text="data.posts.featured.excerpt"></p>
                            <div class="flex items-center gap-4">
                                <img :src="data.posts.featured.author.avatar" :alt="data.posts.featured.author.name" class="w-10 h-10 rounded-full object-cover">
                                <div>
                                    <p class="text-white font-semibold" x-text="data.posts.featured.author.name"></p>
                                    <p class="text-slate-400 text-sm" x-text="data.posts.featured.date + ' • ' + data.posts.featured.readTime + ' min read'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </template>
        </div>
    </section>

    <!-- Blog Posts Grid -->
    <section class="py-12">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="post in data.posts?.items || []" :key="post.id">
                    <a :href="'/en/blog/' + post.slug" class="bg-slate-800 rounded-2xl overflow-hidden group hover:transform hover:scale-105 transition-all duration-300">
                        <div class="h-48 overflow-hidden">
                            <img :src="post.image" :alt="post.title" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <div class="p-6">
                            <div class="flex items-center gap-3 mb-3">
                                <span class="px-2 py-1 bg-orange-500/20 text-orange-500 text-xs font-bold uppercase rounded" x-text="post.category"></span>
                                <span class="text-slate-500 text-sm" x-text="post.readTime + ' min read'"></span>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-3 group-hover:text-orange-500 transition-colors line-clamp-2" x-text="post.title"></h3>
                            <p class="text-slate-400 text-sm mb-4 line-clamp-2" x-text="post.excerpt"></p>
                            <div class="flex items-center gap-3">
                                <img :src="post.author.avatar" :alt="post.author.name" class="w-8 h-8 rounded-full object-cover">
                                <div>
                                    <p class="text-white text-sm font-semibold" x-text="post.author.name"></p>
                                    <p class="text-slate-500 text-xs" x-text="post.date"></p>
                                </div>
                            </div>
                        </div>
                    </a>
                </template>
            </div>

            <!-- Load More -->
            <div class="text-center mt-12">
                <button class="px-8 py-4 bg-slate-800 text-white font-bold uppercase rounded-lg hover:bg-orange-500 transition-colors">
                    Load More Articles
                </button>
            </div>
        </div>
    </section>

    <!-- Newsletter -->
    <section class="py-16 bg-orange-500">
        <div class="container mx-auto px-4">
            <div class="max-w-2xl mx-auto text-center">
                <h2 class="text-3xl font-black text-white mb-4 uppercase">Get Fit Tips Weekly</h2>
                <p class="text-orange-100 mb-8">Subscribe to our newsletter for workout routines, nutrition tips, and exclusive content.</p>
                <form class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto">
                    <input type="email" placeholder="Enter your email"
                        class="flex-1 px-6 py-4 rounded-lg bg-white/20 border border-white/30 text-white placeholder-orange-100 focus:outline-none focus:ring-2 focus:ring-white">
                    <button type="submit" class="px-8 py-4 bg-white text-orange-600 font-bold uppercase rounded-lg hover:bg-slate-100 transition-colors">
                        Subscribe
                    </button>
                </form>
            </div>
        </div>
    </section>
</div>
