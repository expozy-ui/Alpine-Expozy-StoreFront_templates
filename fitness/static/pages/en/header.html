<!-- Fitness/Gym Header -->
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
    x-data="{
        openMobileMenu: false,
        scrolled: false
    }"
    @scroll.window="scrolled = window.pageYOffset > 50"
    :class="scrolled ? 'bg-slate-900 shadow-lg' : 'bg-slate-900/90 backdrop-blur-md'">

    <!-- Top Bar -->
    <div class="bg-orange-500 text-white py-2 text-sm" x-show="!scrolled" x-cloak>
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <span><i class="fa-solid fa-clock mr-2"></i>Mon-Fri: 5AM-11PM | Sat-Sun: 7AM-9PM</span>
                <span class="hidden md:inline"><i class="fa-solid fa-phone mr-2"></i>+1 (555) 123-4567</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="#" class="hover:text-orange-200"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="hover:text-orange-200"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="hover:text-orange-200"><i class="fa-brands fa-youtube"></i></a>
                <span class="mx-2">|</span>
                <a href="/en/homepage" class="text-orange-200 font-semibold">EN</a>
                <a href="/bg/homepage" class="hover:text-orange-200">BG</a>
            </div>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="container mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
            <!-- Logo -->
            <a href="/en/homepage" class="flex items-center">
                <img :src="data.settings?.logo" alt="Fitness Logo" class="h-12 md:h-14">
            </a>

            <!-- Desktop Navigation -->
            <div class="hidden lg:flex items-center gap-8">
                <a href="/en/homepage" class="text-white hover:text-orange-500 transition-colors font-medium">Home</a>
                <div class="relative group">
                    <a href="/en/classes" class="text-white hover:text-orange-500 transition-colors font-medium flex items-center gap-1">
                        Classes <i class="fa-solid fa-chevron-down text-xs"></i>
                    </a>
                    <div class="absolute top-full left-0 mt-2 w-56 bg-slate-800 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                        <a href="/en/classes?type=strength" class="block px-4 py-3 text-slate-300 hover:bg-slate-700 hover:text-orange-500 first:rounded-t-xl">Strength Training</a>
                        <a href="/en/classes?type=cardio" class="block px-4 py-3 text-slate-300 hover:bg-slate-700 hover:text-orange-500">Cardio</a>
                        <a href="/en/classes?type=yoga" class="block px-4 py-3 text-slate-300 hover:bg-slate-700 hover:text-orange-500">Yoga</a>
                        <a href="/en/classes?type=crossfit" class="block px-4 py-3 text-slate-300 hover:bg-slate-700 hover:text-orange-500 last:rounded-b-xl">CrossFit</a>
                    </div>
                </div>
                <a href="/en/trainers" class="text-white hover:text-orange-500 transition-colors font-medium">Trainers</a>
                <a href="/en/membership" class="text-white hover:text-orange-500 transition-colors font-medium">Membership</a>
                <a href="/en/schedule" class="text-white hover:text-orange-500 transition-colors font-medium">Schedule</a>
                <a href="/en/about" class="text-white hover:text-orange-500 transition-colors font-medium">About</a>
                <a href="/en/contacts" class="text-white hover:text-orange-500 transition-colors font-medium">Contact</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-4">
                <!-- Join Button -->
                <a href="/en/membership" class="hidden md:flex items-center gap-2 px-6 py-3 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition-colors font-bold uppercase tracking-wide">
                    Join Now
                </a>

                <!-- User Menu -->
                <a href="/en/login" class="text-white hover:text-orange-500 transition-colors">
                    <i class="fa-solid fa-user text-xl"></i>
                </a>

                <!-- Mobile Menu Button -->
                <button @click="openMobileMenu = true" class="lg:hidden text-white">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div x-show="openMobileMenu" x-cloak
        @click.self="openMobileMenu = false"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50">

        <div x-show="openMobileMenu"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="translate-x-full"
            x-transition:enter-end="translate-x-0"
            class="absolute right-0 top-0 h-full w-80 bg-slate-900 shadow-2xl">

            <div class="p-6">
                <div class="flex justify-between items-center mb-8">
                    <img :src="data.settings?.logo" alt="Logo" class="h-10">
                    <button @click="openMobileMenu = false" class="text-white">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>

                <nav class="space-y-4">
                    <a href="/en/homepage" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">Home</a>
                    <a href="/en/classes" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">Classes</a>
                    <a href="/en/trainers" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">Trainers</a>
                    <a href="/en/membership" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">Membership</a>
                    <a href="/en/schedule" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">Schedule</a>
                    <a href="/en/about" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">About</a>
                    <a href="/en/contacts" class="block py-3 text-white hover:text-orange-500 border-b border-slate-700">Contact</a>
                </nav>

                <a href="/en/membership" class="block w-full mt-8 px-6 py-4 bg-orange-500 text-white text-center rounded-lg hover:bg-orange-600 transition-colors font-bold uppercase">
                    Join Now
                </a>

                <div class="mt-8 pt-8 border-t border-slate-700">
                    <p class="text-slate-500 text-sm mb-4">Contact Us</p>
                    <p class="text-white">+1 (555) 123-4567</p>
                    <p class="text-white">info@fitnessgym.com</p>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Spacer for fixed header -->
<div class="h-20"></div>
