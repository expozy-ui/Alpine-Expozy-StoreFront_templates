<!-- Fitness/Gym Classes Page -->
<div class="min-h-screen bg-slate-900" x-data="{ activeFilter: 'all' }">
    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-slate-900 via-slate-800 to-orange-900 py-16 relative">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1518611012118-696072aa579a?w=1920')] bg-cover bg-center opacity-20"></div>
        <div class="container mx-auto px-4 text-center relative z-10">
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 uppercase">Our Classes</h1>
            <p class="text-slate-300 text-xl">Find the perfect workout for your fitness level and goals</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="py-8 bg-slate-800 sticky top-20 z-30">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap items-center justify-center gap-4">
                <button @click="activeFilter = 'all'"
                    :class="activeFilter === 'all' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-6 py-2 rounded-full font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    All Classes
                </button>
                <button @click="activeFilter = 'strength'"
                    :class="activeFilter === 'strength' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-6 py-2 rounded-full font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Strength
                </button>
                <button @click="activeFilter = 'cardio'"
                    :class="activeFilter === 'cardio' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-6 py-2 rounded-full font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Cardio
                </button>
                <button @click="activeFilter = 'yoga'"
                    :class="activeFilter === 'yoga' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-6 py-2 rounded-full font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Yoga & Pilates
                </button>
                <button @click="activeFilter = 'crossfit'"
                    :class="activeFilter === 'crossfit' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-6 py-2 rounded-full font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    CrossFit
                </button>
                <button @click="activeFilter = 'boxing'"
                    :class="activeFilter === 'boxing' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-6 py-2 rounded-full font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Boxing
                </button>
            </div>
        </div>
    </section>

    <!-- Classes Grid -->
    <section class="py-16" apidata="get.classes" keyname="classes">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="cls in data.classes || []" :key="cls.id">
                    <div class="bg-slate-800 rounded-2xl overflow-hidden group hover:transform hover:scale-105 transition-all duration-300"
                        x-show="activeFilter === 'all' || activeFilter === cls.type">
                        <div class="relative h-64 overflow-hidden">
                            <img :src="cls.image" :alt="cls.name" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
                            <div class="absolute top-4 left-4 flex gap-2">
                                <span class="px-3 py-1 bg-orange-500 text-white text-xs font-bold uppercase rounded" x-text="cls.intensity"></span>
                                <span class="px-3 py-1 bg-slate-900/80 text-white text-xs font-bold uppercase rounded" x-text="cls.type"></span>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold text-white mb-2" x-text="cls.name"></h3>
                            <p class="text-slate-400 text-sm mb-4 line-clamp-2" x-text="cls.description"></p>
                            <div class="flex items-center gap-4 text-slate-400 text-sm mb-4">
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-clock text-orange-500"></i>
                                    <span x-text="cls.duration + ' min'"></span>
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-fire text-orange-500"></i>
                                    <span x-text="cls.calories + ' cal'"></span>
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-users text-orange-500"></i>
                                    <span x-text="cls.maxParticipants"></span>
                                </span>
                            </div>
                            <div class="flex items-center gap-4 mb-4 p-3 bg-slate-900 rounded-lg">
                                <img :src="cls.trainer.image" :alt="cls.trainer.name" class="w-10 h-10 rounded-full object-cover">
                                <div>
                                    <div class="text-white text-sm font-semibold" x-text="cls.trainer.name"></div>
                                    <div class="text-slate-400 text-xs">Instructor</div>
                                </div>
                            </div>
                            <a :href="'/en/class/' + cls.slug" class="block w-full py-3 text-center bg-orange-500 text-white font-bold uppercase rounded-lg hover:bg-orange-600 transition-colors">
                                View Details
                            </a>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Schedule CTA -->
    <section class="py-16 bg-slate-800">
        <div class="container mx-auto px-4">
            <div class="bg-gradient-to-r from-orange-500 to-orange-600 rounded-3xl p-12 text-center">
                <h2 class="text-3xl font-black text-white mb-4 uppercase">Ready to Get Started?</h2>
                <p class="text-orange-100 mb-8 max-w-2xl mx-auto">
                    Check out our weekly schedule and book your first class. New members get their first class free!
                </p>
                <div class="flex flex-wrap justify-center gap-4">
                    <a href="/en/schedule" class="px-8 py-4 bg-white text-orange-600 font-bold uppercase rounded-lg hover:bg-slate-100 transition-colors">
                        View Schedule
                    </a>
                    <a href="/en/membership" class="px-8 py-4 bg-transparent border-2 border-white text-white font-bold uppercase rounded-lg hover:bg-white/10 transition-colors">
                        Join Now
                    </a>
                </div>
            </div>
        </div>
    </section>
</div>
