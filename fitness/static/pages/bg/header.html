<!-- Фитнес Хедър -->
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
    x-data="{ mobileMenu: false, scrolled: false }"
    @scroll.window="scrolled = window.pageYOffset > 50"
    :class="scrolled ? 'bg-slate-900/95 backdrop-blur-md shadow-lg' : 'bg-transparent'">

    <!-- Горна лента -->
    <div class="bg-orange-500 text-white text-sm py-2" x-show="!scrolled" x-transition>
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <span class="flex items-center gap-2">
                        <i class="fa-solid fa-clock"></i>
                        <span>Пон-Пет: 05:00-23:00 | Съб-Нед: 07:00-21:00</span>
                    </span>
                    <span class="hidden md:flex items-center gap-2">
                        <i class="fa-solid fa-phone"></i>
                        <span>+359 2 123 4567</span>
                    </span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="#" class="hover:text-orange-200"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="hover:text-orange-200"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="hover:text-orange-200"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Основна навигация -->
    <nav class="container mx-auto px-4">
        <div class="flex items-center justify-between h-20">
            <!-- Лого -->
            <a href="/bg/homepage" class="flex items-center">
                <img :src="data.settings?.logo" alt="Фитнес Лого" class="h-12">
            </a>

            <!-- Десктоп меню -->
            <div class="hidden lg:flex items-center gap-8">
                <a href="/bg/homepage" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Начало</a>
                <a href="/bg/classes" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Класове</a>
                <a href="/bg/schedule" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Програма</a>
                <a href="/bg/trainers" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Треньори</a>
                <a href="/bg/membership" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Членство</a>
                <a href="/bg/blog" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Блог</a>
                <a href="/bg/contacts" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">Контакти</a>
            </div>

            <!-- CTA бутони -->
            <div class="hidden lg:flex items-center gap-4">
                <a href="/bg/login" class="text-white font-bold uppercase text-sm hover:text-orange-500 transition-colors">
                    <i class="fa-solid fa-user mr-2"></i>Вход
                </a>
                <a href="/bg/membership" class="px-6 py-3 bg-orange-500 text-white font-bold uppercase text-sm rounded-lg hover:bg-orange-600 transition-colors">
                    Запиши се
                </a>
            </div>

            <!-- Мобилен бутон -->
            <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-white text-2xl">
                <i :class="mobileMenu ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
            </button>
        </div>

        <!-- Мобилно меню -->
        <div x-show="mobileMenu" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-4"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-4"
            class="lg:hidden bg-slate-800 rounded-xl mt-2 p-4">
            <div class="flex flex-col gap-4">
                <a href="/bg/homepage" class="text-white font-bold uppercase text-sm hover:text-orange-500">Начало</a>
                <a href="/bg/classes" class="text-white font-bold uppercase text-sm hover:text-orange-500">Класове</a>
                <a href="/bg/schedule" class="text-white font-bold uppercase text-sm hover:text-orange-500">Програма</a>
                <a href="/bg/trainers" class="text-white font-bold uppercase text-sm hover:text-orange-500">Треньори</a>
                <a href="/bg/membership" class="text-white font-bold uppercase text-sm hover:text-orange-500">Членство</a>
                <a href="/bg/blog" class="text-white font-bold uppercase text-sm hover:text-orange-500">Блог</a>
                <a href="/bg/contacts" class="text-white font-bold uppercase text-sm hover:text-orange-500">Контакти</a>
                <hr class="border-slate-700">
                <a href="/bg/login" class="text-white font-bold uppercase text-sm hover:text-orange-500">
                    <i class="fa-solid fa-user mr-2"></i>Вход
                </a>
                <a href="/bg/membership" class="px-6 py-3 bg-orange-500 text-white font-bold uppercase text-sm rounded-lg text-center">
                    Запиши се
                </a>
            </div>
        </div>
    </nav>
</header>
<div class="h-20"></div>
