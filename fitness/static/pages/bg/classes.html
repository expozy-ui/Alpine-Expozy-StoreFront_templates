<!-- Фитнес Класове страница -->
<div class="min-h-screen bg-slate-900" x-data="{ activeFilter: 'all' }">
    <!-- Хиро секция -->
    <section class="bg-gradient-to-r from-slate-900 via-slate-800 to-orange-900 py-16 relative">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1518611012118-696072aa579a?w=1920')] bg-cover bg-center opacity-20"></div>
        <div class="container mx-auto px-4 text-center relative z-10">
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 uppercase">Нашите класове</h1>
            <p class="text-slate-300 text-xl">Открийте перфектната тренировка за вашите цели</p>
        </div>
    </section>

    <!-- Филтри -->
    <section class="py-8 bg-slate-800 sticky top-20 z-30">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap items-center justify-center gap-3">
                <button @click="activeFilter = 'all'"
                    :class="activeFilter === 'all' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Всички класове
                </button>
                <button @click="activeFilter = 'strength'"
                    :class="activeFilter === 'strength' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Силови
                </button>
                <button @click="activeFilter = 'cardio'"
                    :class="activeFilter === 'cardio' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Кардио
                </button>
                <button @click="activeFilter = 'yoga'"
                    :class="activeFilter === 'yoga' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Йога & Пилатес
                </button>
                <button @click="activeFilter = 'crossfit'"
                    :class="activeFilter === 'crossfit' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Кросфит
                </button>
                <button @click="activeFilter = 'boxing'"
                    :class="activeFilter === 'boxing' ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-300'"
                    class="px-4 py-2 rounded-lg font-bold uppercase text-sm hover:bg-orange-500 hover:text-white transition-colors">
                    Бокс
                </button>
            </div>
        </div>
    </section>

    <!-- Мрежа с класове -->
    <section class="py-16" apidata="get.classes" keyname="classes">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="classItem in (data.classes || []).filter(c => activeFilter === 'all' || c.type === activeFilter)" :key="classItem.id">
                    <div class="bg-slate-800 rounded-2xl overflow-hidden group hover:transform hover:scale-105 transition-all duration-300">
                        <div class="h-56 overflow-hidden relative">
                            <img :src="classItem.image" :alt="classItem.name" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
                            <div class="absolute top-4 right-4 flex gap-2">
                                <span class="px-3 py-1 bg-orange-500 text-white text-xs font-bold uppercase rounded" x-text="classItem.intensity"></span>
                            </div>
                            <div class="absolute bottom-4 left-4 right-4">
                                <h3 class="text-2xl font-black text-white" x-text="classItem.name"></h3>
                            </div>
                        </div>
                        <div class="p-6">
                            <p class="text-slate-400 mb-4" x-text="classItem.description"></p>
                            <div class="flex flex-wrap gap-4 text-sm text-slate-400 mb-4">
                                <span class="flex items-center gap-2">
                                    <i class="fa-solid fa-clock text-orange-500"></i>
                                    <span x-text="classItem.duration + ' мин'"></span>
                                </span>
                                <span class="flex items-center gap-2">
                                    <i class="fa-solid fa-fire text-orange-500"></i>
                                    <span x-text="classItem.calories + ' кал'"></span>
                                </span>
                                <span class="flex items-center gap-2">
                                    <i class="fa-solid fa-users text-orange-500"></i>
                                    <span x-text="'Макс. ' + classItem.maxParticipants"></span>
                                </span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <img :src="classItem.trainer.image" :alt="classItem.trainer.name" class="w-10 h-10 rounded-full object-cover">
                                    <span class="text-slate-300" x-text="classItem.trainer.name"></span>
                                </div>
                                <a :href="'/bg/schedule?class=' + classItem.slug" class="px-4 py-2 bg-orange-500 text-white font-bold text-sm uppercase rounded-lg hover:bg-orange-600 transition-colors">
                                    Виж часовете
                                </a>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- CTA секция -->
    <section class="py-16 bg-slate-800">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto text-center">
                <h2 class="text-3xl font-black text-white mb-4 uppercase">Не сте сигурни кой клас е за вас?</h2>
                <p class="text-slate-400 mb-8">Резервирайте безплатна консултация с наш треньор, за да намерите перфектната тренировка за вашите цели.</p>
                <a href="/bg/contacts" class="inline-block px-8 py-4 bg-orange-500 text-white font-bold uppercase rounded-lg hover:bg-orange-600 transition-colors">
                    Резервирай консултация
                </a>
            </div>
        </div>
    </section>
</div>
