<!-- Education/Courses - Instructors Page -->
<div class="min-h-screen bg-white" apidata="get.instructors" keyname="instructors">
    <!-- Hero Section -->
    <section class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-16">
        <div class="container mx-auto px-4 text-center">
            <span class="text-indigo-600 font-semibold text-sm uppercase tracking-wider">Learn From Experts</span>
            <h1 class="text-4xl md:text-5xl font-bold text-slate-800 mt-2">Our Instructors</h1>
            <p class="text-slate-600 mt-4 max-w-2xl mx-auto">Meet the industry professionals and experts who are passionate about sharing their knowledge.</p>
        </div>
    </section>

    <!-- Search & Filter -->
    <section class="py-8 bg-white sticky top-32 z-30 shadow-sm">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="relative w-full md:w-96">
                    <input type="text" placeholder="Search instructors..."
                        class="w-full px-4 py-3 pl-12 border border-slate-200 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <div class="flex flex-wrap gap-2" x-data="{ activeSpecialty: 'all' }">
                    <button @click="activeSpecialty = 'all'"
                        :class="activeSpecialty === 'all' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        All
                    </button>
                    <button @click="activeSpecialty = 'development'"
                        :class="activeSpecialty === 'development' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Development
                    </button>
                    <button @click="activeSpecialty = 'design'"
                        :class="activeSpecialty === 'design' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Design
                    </button>
                    <button @click="activeSpecialty = 'business'"
                        :class="activeSpecialty === 'business' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Business
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Instructors Grid -->
    <section class="py-16">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <template x-for="instructor in data.instructors || []" :key="instructor.id">
                    <a :href="'/en/instructor/' + instructor.slug" class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-xl transition-shadow border border-slate-100 group">
                        <div class="h-64 overflow-hidden">
                            <img :src="instructor.image" :alt="instructor.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-6 text-center">
                            <h3 class="text-xl font-bold text-slate-800 group-hover:text-indigo-600 transition-colors" x-text="instructor.name"></h3>
                            <p class="text-indigo-600 font-semibold mb-3" x-text="instructor.specialty"></p>
                            <div class="flex justify-center items-center gap-4 text-sm text-slate-500 mb-4">
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-star text-yellow-500"></i>
                                    <span x-text="instructor.rating"></span>
                                </span>
                                <span x-text="instructor.courses + ' Courses'"></span>
                            </div>
                            <div class="flex justify-center gap-3">
                                <span class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-indigo-600 hover:text-white transition-colors">
                                    <i class="fa-brands fa-twitter text-sm"></i>
                                </span>
                                <span class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-indigo-600 hover:text-white transition-colors">
                                    <i class="fa-brands fa-linkedin-in text-sm"></i>
                                </span>
                                <span class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-indigo-600 hover:text-white transition-colors">
                                    <i class="fa-solid fa-globe text-sm"></i>
                                </span>
                            </div>
                        </div>
                    </a>
                </template>
            </div>
        </div>
    </section>

    <!-- Become Instructor CTA -->
    <section class="py-20 bg-indigo-600">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Become an Instructor</h2>
            <p class="text-indigo-100 mb-8 max-w-2xl mx-auto">
                Share your expertise with thousands of students worldwide. Join our community of instructors and start teaching today.
            </p>
            <a href="/en/become-instructor" class="inline-block px-8 py-4 bg-white text-indigo-700 font-semibold rounded-full hover:bg-slate-100 transition-colors">
                Start Teaching Today
            </a>
        </div>
    </section>
</div>
