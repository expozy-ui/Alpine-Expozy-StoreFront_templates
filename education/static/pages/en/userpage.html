<!-- Education/Courses Student Dashboard Page -->
<div class="min-h-screen bg-slate-50" x-data="{ activeTab: 'overview' }" apidata="get.student_dashboard" keyname="student">
    <!-- Dashboard Header -->
    <section class="bg-white border-b">
        <div class="container mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div class="relative">
                    <img :src="data.student?.avatar || 'https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=200'"
                        alt="Profile" class="w-20 h-20 rounded-full object-cover border-4 border-indigo-100">
                </div>
                <div class="text-center md:text-left">
                    <h1 class="text-2xl font-bold text-slate-800" x-text="'Welcome back, ' + (data.student?.firstName || 'Student')"></h1>
                    <p class="text-slate-600">Continue your learning journey</p>
                </div>
                <div class="md:ml-auto flex gap-4">
                    <a href="/en/courses" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                        <i class="fa-solid fa-book mr-2"></i>Browse Courses
                    </a>
                    <button @click="alpineListeners('Auth.logout', $event)" class="px-6 py-3 bg-slate-200 text-slate-700 font-semibold rounded-full hover:bg-slate-300 transition-colors">
                        <i class="fa-solid fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Dashboard Tabs -->
    <section class="bg-white shadow-sm sticky top-32 z-30">
        <div class="container mx-auto px-4">
            <div class="flex overflow-x-auto gap-2 py-4">
                <button @click="activeTab = 'overview'"
                    :class="activeTab === 'overview' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-chart-line mr-2"></i>Overview
                </button>
                <button @click="activeTab = 'courses'"
                    :class="activeTab === 'courses' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-book mr-2"></i>My Courses
                </button>
                <button @click="activeTab = 'certificates'"
                    :class="activeTab === 'certificates' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-certificate mr-2"></i>Certificates
                </button>
                <button @click="activeTab = 'wishlist'"
                    :class="activeTab === 'wishlist' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-heart mr-2"></i>Wishlist
                </button>
                <button @click="activeTab = 'settings'"
                    :class="activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-cog mr-2"></i>Settings
                </button>
            </div>
        </div>
    </section>

    <!-- Dashboard Content -->
    <section class="py-8">
        <div class="container mx-auto px-4">
            <!-- Overview Tab -->
            <div x-show="activeTab === 'overview'" class="space-y-8">
                <!-- Stats -->
                <div class="grid md:grid-cols-4 gap-6">
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-book text-2xl text-indigo-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="data.student?.enrolledCourses || 0"></div>
                                <div class="text-slate-500 text-sm">Enrolled Courses</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-check-circle text-2xl text-emerald-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="data.student?.completedCourses || 0"></div>
                                <div class="text-slate-500 text-sm">Completed</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-purple-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-certificate text-2xl text-purple-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="data.student?.certificates || 0"></div>
                                <div class="text-slate-500 text-sm">Certificates</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-orange-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-clock text-2xl text-orange-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="(data.student?.hoursLearned || 0) + 'h'"></div>
                                <div class="text-slate-500 text-sm">Hours Learned</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Continue Learning -->
                <div class="bg-white rounded-2xl p-8 shadow-lg border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Continue Learning</h3>
                    <div class="space-y-4">
                        <template x-for="course in (data.student?.inProgressCourses || []).slice(0, 3)" :key="course.id">
                            <div class="flex flex-col md:flex-row gap-4 items-center p-4 bg-slate-50 rounded-xl">
                                <img :src="course.image" :alt="course.title" class="w-24 h-16 rounded-lg object-cover">
                                <div class="flex-1 text-center md:text-left">
                                    <h4 class="font-bold text-slate-800" x-text="course.title"></h4>
                                    <p class="text-slate-500 text-sm" x-text="course.instructor"></p>
                                </div>
                                <div class="w-full md:w-48">
                                    <div class="flex items-center justify-between text-sm mb-1">
                                        <span class="text-slate-600">Progress</span>
                                        <span class="font-semibold text-indigo-600" x-text="course.progress + '%'"></span>
                                    </div>
                                    <div class="h-2 bg-slate-200 rounded-full">
                                        <div class="h-2 bg-indigo-600 rounded-full" :style="'width: ' + course.progress + '%'"></div>
                                    </div>
                                </div>
                                <a :href="'/en/course/' + course.slug + '/learn'" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                                    Continue
                                </a>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- My Courses Tab -->
            <div x-show="activeTab === 'courses'" x-cloak class="space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-800">My Courses</h2>
                    <a href="/en/courses" class="text-indigo-600 font-semibold hover:text-indigo-700">Browse More Courses</a>
                </div>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="course in data.student?.courses || []" :key="course.id">
                        <div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-slate-100">
                            <div class="h-40 overflow-hidden relative">
                                <img :src="course.image" :alt="course.title" class="w-full h-full object-cover">
                                <span class="absolute top-2 right-2 px-2 py-1 text-xs font-semibold rounded"
                                    :class="course.progress === 100 ? 'bg-emerald-500 text-white' : 'bg-indigo-500 text-white'"
                                    x-text="course.progress === 100 ? 'Completed' : course.progress + '%'"></span>
                            </div>
                            <div class="p-4">
                                <h4 class="font-bold text-slate-800 mb-2 line-clamp-2" x-text="course.title"></h4>
                                <div class="h-2 bg-slate-200 rounded-full mb-3">
                                    <div class="h-2 rounded-full" :class="course.progress === 100 ? 'bg-emerald-500' : 'bg-indigo-600'" :style="'width: ' + course.progress + '%'"></div>
                                </div>
                                <a :href="'/en/course/' + course.slug + '/learn'" class="block text-center py-2 bg-indigo-100 text-indigo-700 font-semibold rounded-full hover:bg-indigo-600 hover:text-white transition-colors">
                                    <span x-text="course.progress === 100 ? 'Review Course' : 'Continue Learning'"></span>
                                </a>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Settings Tab -->
            <div x-show="activeTab === 'settings'" x-cloak class="max-w-2xl">
                <div class="bg-white rounded-2xl p-8 shadow-lg border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Profile Settings</h3>
                    <form class="space-y-6">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-slate-700 font-semibold mb-2">First Name</label>
                                <input type="text" :value="data.student?.firstName" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 font-semibold mb-2">Last Name</label>
                                <input type="text" :value="data.student?.lastName" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-slate-700 font-semibold mb-2">Email</label>
                            <input type="email" :value="data.student?.email" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-slate-700 font-semibold mb-2">Bio</label>
                            <textarea rows="3" :value="data.student?.bio" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500"></textarea>
                        </div>
                        <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                            Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</div>
