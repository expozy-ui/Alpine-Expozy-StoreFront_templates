<!-- Education/Courses Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white shadow-md" x-data="{ mobileMenuOpen: false, searchOpen: false }">
    <!-- Top Bar -->
    <div class="bg-indigo-900 text-white py-2">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between text-sm">
                <div class="flex items-center gap-6">
                    <span class="flex items-center gap-2">
                        <i class="fa-solid fa-phone"></i>
                        <a href="tel:+15551234567" class="hover:text-indigo-300">+1 (555) 123-4567</a>
                    </span>
                    <span class="hidden md:flex items-center gap-2">
                        <i class="fa-solid fa-envelope"></i>
                        <a href="mailto:info@learnhub.com" class="hover:text-indigo-300">info@learnhub.com</a>
                    </span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/en/become-instructor" class="hover:text-indigo-300">Become an Instructor</a>
                    <div class="flex items-center gap-2">
                        <a href="/bg/homepage" class="hover:text-indigo-300">BG</a>
                        <span>|</span>
                        <a href="/en/homepage" class="text-indigo-300 font-semibold">EN</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="py-4">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <a href="/en/homepage" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold text-slate-800">Learn<span class="text-indigo-600">Hub</span></span>
                </a>

                <!-- Search Bar -->
                <div class="hidden lg:flex flex-1 max-w-xl mx-8">
                    <div class="relative w-full">
                        <input type="text" placeholder="Search for courses..."
                            class="w-full px-4 py-3 pl-12 border border-slate-200 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden lg:flex items-center gap-6">
                    <a href="/en/courses" class="text-slate-700 font-semibold hover:text-indigo-600 transition-colors">Courses</a>
                    <a href="/en/instructors" class="text-slate-700 font-semibold hover:text-indigo-600 transition-colors">Instructors</a>
                    <a href="/en/blog" class="text-slate-700 font-semibold hover:text-indigo-600 transition-colors">Blog</a>
                    <a href="/en/about" class="text-slate-700 font-semibold hover:text-indigo-600 transition-colors">About</a>
                    <a href="/en/contacts" class="text-slate-700 font-semibold hover:text-indigo-600 transition-colors">Contact</a>
                </div>

                <!-- Auth Buttons -->
                <div class="hidden lg:flex items-center gap-4">
                    <a href="/en/login" class="px-6 py-2 text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">
                        Sign In
                    </a>
                    <a href="/en/login" class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                        Get Started
                    </a>
                </div>

                <!-- Mobile Menu Button -->
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden p-2 text-slate-700">
                    <i class="fa-solid fa-bars text-2xl" x-show="!mobileMenuOpen"></i>
                    <i class="fa-solid fa-times text-2xl" x-show="mobileMenuOpen" x-cloak></i>
                </button>
            </div>

            <!-- Mobile Menu -->
            <div x-show="mobileMenuOpen" x-collapse x-cloak class="lg:hidden mt-4 pb-4 border-t border-slate-200 pt-4">
                <div class="mb-4">
                    <input type="text" placeholder="Search for courses..."
                        class="w-full px-4 py-3 border border-slate-200 rounded-full focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex flex-col gap-4">
                    <a href="/en/courses" class="text-slate-700 font-semibold hover:text-indigo-600">Courses</a>
                    <a href="/en/instructors" class="text-slate-700 font-semibold hover:text-indigo-600">Instructors</a>
                    <a href="/en/blog" class="text-slate-700 font-semibold hover:text-indigo-600">Blog</a>
                    <a href="/en/about" class="text-slate-700 font-semibold hover:text-indigo-600">About</a>
                    <a href="/en/contacts" class="text-slate-700 font-semibold hover:text-indigo-600">Contact</a>
                    <hr class="border-slate-200">
                    <a href="/en/login" class="text-indigo-600 font-semibold">Sign In</a>
                    <a href="/en/login" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-full text-center">Get Started</a>
                </div>
            </div>
        </div>
    </nav>
</header>
<div class="h-32"></div>
