<!-- Образователна платформа Курсове страница -->
<div class="min-h-screen bg-white" x-data="{ activeCategory: 'all', activeLevel: 'all' }" apidata="get.courses" keyname="courses">
    <!-- Хиро секция -->
    <section class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-16">
        <div class="container mx-auto px-4 text-center">
            <span class="text-indigo-600 font-semibold text-sm uppercase tracking-wider">Разширете знанията си</span>
            <h1 class="text-4xl md:text-5xl font-bold text-slate-800 mt-2">Разгледайте курсовете</h1>
            <p class="text-slate-600 mt-4 max-w-2xl mx-auto">Открийте стотици курсове от експерти и развийте уменията си.</p>
        </div>
    </section>

    <!-- Филтри -->
    <section class="py-8 bg-white sticky top-32 z-30 shadow-md">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="relative w-full md:w-96">
                    <input type="text" placeholder="Търсене на курсове..."
                        class="w-full px-4 py-3 pl-12 border border-slate-200 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button @click="activeCategory = 'all'"
                        :class="activeCategory === 'all' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Всички
                    </button>
                    <button @click="activeCategory = 'development'"
                        :class="activeCategory === 'development' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Разработка
                    </button>
                    <button @click="activeCategory = 'design'"
                        :class="activeCategory === 'design' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Дизайн
                    </button>
                    <button @click="activeCategory = 'business'"
                        :class="activeCategory === 'business' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:text-white transition-colors">
                        Бизнес
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Мрежа с курсове -->
    <section class="py-16">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <template x-for="course in (data.courses || []).filter(c => activeCategory === 'all' || c.category.toLowerCase() === activeCategory)" :key="course.id">
                    <a :href="'/bg/course/' + course.slug" class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-xl transition-shadow border border-slate-100 group">
                        <div class="h-48 overflow-hidden relative">
                            <img :src="course.image" :alt="course.title" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <span class="absolute top-4 left-4 px-3 py-1 bg-indigo-600 text-white text-xs font-semibold rounded-full" x-text="course.category"></span>
                            <template x-if="course.bestseller">
                                <span class="absolute top-4 right-4 px-3 py-1 bg-yellow-500 text-white text-xs font-semibold rounded-full">Бестселър</span>
                            </template>
                        </div>
                        <div class="p-6">
                            <h3 class="text-lg font-bold text-slate-800 mb-2 group-hover:text-indigo-600 transition-colors line-clamp-2" x-text="course.title"></h3>
                            <div class="flex items-center gap-3 mb-3">
                                <img :src="course.instructor.avatar" :alt="course.instructor.name" class="w-8 h-8 rounded-full object-cover">
                                <span class="text-slate-600 text-sm" x-text="course.instructor.name"></span>
                            </div>
                            <div class="flex items-center gap-4 text-sm text-slate-500 mb-4">
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-clock"></i>
                                    <span x-text="course.duration"></span>
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-signal"></i>
                                    <span x-text="course.level"></span>
                                </span>
                            </div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="flex text-yellow-500">
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star-half-stroke"></i>
                                </div>
                                <span class="text-slate-600 text-sm" x-text="course.rating + ' (' + course.reviews + ')'"></span>
                            </div>
                            <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                                <div>
                                    <span class="text-2xl font-bold text-indigo-600" x-text="course.price + ' лв.'"></span>
                                </div>
                            </div>
                        </div>
                    </a>
                </template>
            </div>
        </div>
    </section>
</div>
