<!-- Образователна платформа Табло на студента -->
<div class="min-h-screen bg-slate-50" x-data="{ activeTab: 'overview' }" apidata="get.student_dashboard" keyname="student">
    <!-- Заглавие -->
    <section class="bg-white border-b">
        <div class="container mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div class="relative">
                    <img :src="data.student?.avatar || 'https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=200'"
                        alt="Профил" class="w-20 h-20 rounded-full object-cover border-4 border-indigo-100">
                </div>
                <div class="text-center md:text-left">
                    <h1 class="text-2xl font-bold text-slate-800" x-text="'Добре дошли, ' + (data.student?.firstName || 'Студент')"></h1>
                    <p class="text-slate-600">Продължете обучението си</p>
                </div>
                <div class="md:ml-auto flex gap-4">
                    <a href="/bg/courses" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                        <i class="fa-solid fa-book mr-2"></i>Разгледай курсове
                    </a>
                    <button @click="alpineListeners('Auth.logout', $event)" class="px-6 py-3 bg-slate-200 text-slate-700 font-semibold rounded-full hover:bg-slate-300 transition-colors">
                        <i class="fa-solid fa-sign-out-alt mr-2"></i>Изход
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Табове -->
    <section class="bg-white shadow-sm sticky top-32 z-30">
        <div class="container mx-auto px-4">
            <div class="flex overflow-x-auto gap-2 py-4">
                <button @click="activeTab = 'overview'"
                    :class="activeTab === 'overview' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-chart-line mr-2"></i>Преглед
                </button>
                <button @click="activeTab = 'courses'"
                    :class="activeTab === 'courses' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-book mr-2"></i>Моите курсове
                </button>
                <button @click="activeTab = 'certificates'"
                    :class="activeTab === 'certificates' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-certificate mr-2"></i>Сертификати
                </button>
                <button @click="activeTab = 'settings'"
                    :class="activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                    class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-indigo-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-cog mr-2"></i>Настройки
                </button>
            </div>
        </div>
    </section>

    <!-- Съдържание -->
    <section class="py-8">
        <div class="container mx-auto px-4">
            <!-- Таб Преглед -->
            <div x-show="activeTab === 'overview'" class="space-y-8">
                <!-- Статистика -->
                <div class="grid md:grid-cols-4 gap-6">
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-book text-2xl text-indigo-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="data.student?.enrolledCourses || 0"></div>
                                <div class="text-slate-500 text-sm">Записани курсове</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-check-circle text-2xl text-emerald-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="data.student?.completedCourses || 0"></div>
                                <div class="text-slate-500 text-sm">Завършени</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-purple-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-certificate text-2xl text-purple-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="data.student?.certificates || 0"></div>
                                <div class="text-slate-500 text-sm">Сертификати</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-orange-100 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-clock text-2xl text-orange-600"></i>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-slate-800" x-text="(data.student?.hoursLearned || 0) + 'ч'"></div>
                                <div class="text-slate-500 text-sm">Часове обучение</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Продължете обучението -->
                <div class="bg-white rounded-2xl p-8 shadow-lg border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Продължете обучението</h3>
                    <div class="space-y-4">
                        <template x-for="course in (data.student?.inProgressCourses || []).slice(0, 3)" :key="course.id">
                            <div class="flex flex-col md:flex-row gap-4 items-center p-4 bg-slate-50 rounded-xl">
                                <img :src="course.image" :alt="course.title" class="w-24 h-16 rounded-lg object-cover">
                                <div class="flex-1 text-center md:text-left">
                                    <h4 class="font-bold text-slate-800" x-text="course.title"></h4>
                                    <p class="text-slate-500 text-sm" x-text="course.instructor"></p>
                                </div>
                                <div class="w-full md:w-48">
                                    <div class="flex items-center justify-between text-sm mb-1">
                                        <span class="text-slate-600">Прогрес</span>
                                        <span class="font-semibold text-indigo-600" x-text="course.progress + '%'"></span>
                                    </div>
                                    <div class="h-2 bg-slate-200 rounded-full">
                                        <div class="h-2 bg-indigo-600 rounded-full" :style="'width: ' + course.progress + '%'"></div>
                                    </div>
                                </div>
                                <a :href="'/bg/course/' + course.slug + '/learn'" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                                    Продължи
                                </a>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Таб Настройки -->
            <div x-show="activeTab === 'settings'" x-cloak class="max-w-2xl">
                <div class="bg-white rounded-2xl p-8 shadow-lg border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Настройки на профила</h3>
                    <form class="space-y-6">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-slate-700 font-semibold mb-2">Име</label>
                                <input type="text" :value="data.student?.firstName" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 font-semibold mb-2">Фамилия</label>
                                <input type="text" :value="data.student?.lastName" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-slate-700 font-semibold mb-2">Имейл</label>
                            <input type="email" :value="data.student?.email" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700 transition-colors">
                            Запази промените
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</div>
